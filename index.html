<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shanu Ai — Mood Chat</title>




<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">



<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Nunito", sans-serif !important;
}
:root {
  --bg: #0A0F19;
  --panel: #12151c;
  --muted: #98a1a8;
  --cyan: #00eaff;
  --card: #141A1E;
  --user-text: #022;
}
html,body { height: 100%; }
body {
  background: var(--bg);
  color: #e9e9e9;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 640px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  padding: 18px;
  border-radius: 14px;
  height: 92vh;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.03);
  display: flex;
  flex-direction: column;
}

header {

  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:10px;
  
}

.logo {
  width:48px;
  height:48px;
  background: linear-gradient(135deg,var(--cyan), #00b3ff);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color: #022;
  font-weight:700;
  font-size:18px;
  box-shadow: 0 6px 18px rgba(0,180,255,0.06);
}

h1 {
margin-left:5px;
  font-size:18px;
  color: var(--cyan);
  letter-spacing:0.6px;
}

.small{
margin-left:5px;
font-size:10px;}
.controls {
  margin-top:8px;
  display:flex;
  gap:10px;
  align-items:center;
}

select, .smallBtn {
  padding:10px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.03);
  background: var(--card);
  color: #e9e9e9;
  font-size:14px;
  outline:none;
}

.smallBtn {
  cursor:pointer;
}

#chat {
  margin-top:12px;
  flex:1;
  overflow-y:auto;
  padding:16px;
  border-radius:12px;
  background: var(--card);
  border:1px solid rgba(255,255,255,0.03);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.01);

}

.placeholder {
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-top:40%;
}

.msg {
  padding:12px 14px;
  margin-bottom:12px;
  border-radius:12px;
  max-width:78%;
  width:fit-content;
  line-height:1.45;


  word-break:break-word;
  font-size:15px;
  animation: pop .16s ease-out;
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}

@keyframes pop {
  from { transform: translateY(6px) scale(0.99); opacity:0; }
  to   { transform: translateY(0) scale(1); opacity:1; }
}

.user {
  margin-left:auto;
  background: linear-gradient(135deg, var(--cyan), #00b3ff);
  color: var(--user-text);
}

.bot {
  background: #0f1418;
  border: 1px solid rgba(255,255,255,0.03);
  color: #e6eef6;
  max-width: 95% !important;  /* Bot bubble wider */
  width: fit-content;
}
.error {
  background: #2a0000;
  border: 1px solid #ff3b3b;
  color: #ffdede;
}

.inputArea {
  display:flex;
  gap:10px;
  margin-top:12px;
  align-items:flex-end;
}

#inputBox {
  flex:1;
  min-height:44px;
  max-height:140px;
  padding:12px 14px;
  border-radius:12px;
  border:none;
  background: var(--card);
  color: #e9e9e9;
  outline:none;
  font-size:15px;
  resize:none;
  overflow:auto;
}

#sendBtn {
  width:96px;
  padding:12px;
  border-radius:12px;
  border:none;
  background: var(--cyan);
  color: var(--user-text);
  font-weight:700;
  cursor:pointer;
  transition: transform .08s ease;
}
#sendBtn:active { transform: translateY(1px); }

@media (max-width:540px){
  .container { padding:12px; height:100vh; border-radius:0; max-width:100%; }
  #sendBtn { width:84px; }
}

/* Typing indicator (3 animated dots) */
.typing-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: #0f1418;
  border-radius: 12px;
  width: fit-content;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.03);
}

.typing-dot {
  width: 8px;
  height: 8px;
  background: #8aa6ff;
  border-radius: 50%;
  animation: blink 1.4s infinite;
  opacity: 0.6;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0% { opacity: 0.2; transform: translateY(0); }
  50% { opacity: 1;   transform: translateY(-4px); }
  100% { opacity: 0.2; transform: translateY(0); }
}
</style>
</head>

<body>
  <div class="container">
    <header>

      <div>
        <h1>Shanu Ai</h1>
        <div class="small">Mood-based replies</div>
      </div>

      <div style="margin-left:auto; display:flex; gap:8px;">
        <select id="moodSelect"></select>
        <button class="smallBtn" id="clearBtn">Clear</button>
      </div>
    </header>

    <div id="chat">
      <div class="placeholder" id="emptyPlaceholder">
        Say hi to Shanu 👋 — choose a mood and start chatting.
      </div>
    </div>

    <div class="inputArea">
      <textarea id="inputBox" placeholder="Type your message..." rows="1"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
<script src="chat.js"></script>
</body>
  </html>
