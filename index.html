<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanu AI | Next-Gen Conversational AI</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Tesseract.js v4 OCR -->
    <script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Noise texture overlay -->
    <div class="noise-overlay"></div>

    <div class="app-container">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-box">
                    <span>S</span>
                    <div class="logo-pulse"></div>
                </div>
                <div class="brand-info">
                    <h2>Shanu AI</h2>
                    <p>By Shiva Saini</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" id="newChatBtn">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Chat</span>
                </button>
                <div class="history-label">
                    <i class="fa-solid fa-clock-rotate-left" style="font-size:10px;"></i> Recent Moods
                </div>
                <div id="recentMoods" class="mood-history"></div>
            </nav>

            <div class="sidebar-footer">
                <button class="icon-btn" title="Settings" id="settingsBtn">
                    <i class="fa-solid fa-gear"></i>
                </button>
                <button class="icon-btn" id="clearBtn" title="Clear History">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        </aside>

        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- ===== MAIN CHAT WRAPPER ===== -->
        <main class="chat-wrapper">

            <!-- Header -->
            <header class="chat-header">
                <div class="header-left">
                    <!-- Mobile sidebar toggle -->
                    <button class="icon-btn mobile-menu-btn" id="menuBtn" title="Menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="mood-selector-wrapper">
                        <button id="moodBtn" class="glass-btn">
                            <span id="currentMoodLabel">😌 Normal</span>
                            <i class="fa-solid fa-chevron-down chev-icon"></i>
                        </button>
                        <div id="moodList" class="mood-dropdown glass-card"></div>
                    </div>
                </div>
                <div class="header-right">
                    <div class="status-indicator">
                        <span class="dot pulse-dot"></span>
                        <span>Online</span>
                    </div>
                </div>
            </header>

            <!-- Chat Display -->
            <section id="chat" class="chat-display">
                <div class="welcome-screen" id="emptyPlaceholder">
                    <div class="welcome-icon-wrap">
                        <div class="welcome-icon">✦</div>
                        <div class="welcome-ring"></div>
                    </div>
                    <h1>Shanu AI se baatein karein</h1>
                    <p>Experience next-level Hinglish AI. Upload images, PDFs, or speak your message.</p>
                    <div class="feature-pills">
                        <span class="pill"><i class="fa-solid fa-image"></i> Image OCR</span>
                        <span class="pill"><i class="fa-solid fa-file-pdf"></i> PDF Scan</span>
                        <span class="pill"><i class="fa-solid fa-microphone"></i> Voice Input</span>
                        <span class="pill"><i class="fa-solid fa-masks-theater"></i> 8 Moods</span>
                    </div>
                </div>
            </section>

            <!-- ===== INPUT SECTION ===== -->
            <footer class="input-section">

                <!-- File Preview Bar -->
                <div class="file-preview-bar" id="filePreviewBar">
                    <div class="file-chip" id="fileChip">
                        <div class="file-chip-icon" id="fileChipIcon">
                            <i class="fa-solid fa-file-image"></i>
                        </div>
                        <div class="file-chip-info">
                            <span class="file-chip-name" id="fileChipName">filename.jpg</span>
                            <span class="file-chip-status" id="fileChipStatus">Ready to send</span>
                        </div>
                        <button class="file-chip-remove" id="removeFileBtn" title="Remove">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <!-- OCR Progress -->
                    <div class="ocr-progress-bar" id="ocrProgressBar">
                        <div class="ocr-progress-fill" id="ocrProgressFill"></div>
                    </div>
                </div>

                <!-- Input Bar -->
                <div class="input-container">
                    <div class="input-bar glass-card" id="inputBar">

                        <!-- Attach Button -->
                        <button class="icon-action-btn attach-btn" id="attachBtn" title="Attach file (Image / PDF / TXT)">
                            <i class="fa-solid fa-paperclip"></i>
                        </button>

                        <!-- Hidden file input -->
                        <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.csv" hidden>

                        <!-- Textarea -->
                        <textarea id="inputBox" placeholder="Message Shanu AI..." rows="1"></textarea>

                        <!-- Right actions -->
                        <div class="action-buttons">
                            <!-- Mic Button -->
                            <button class="icon-action-btn mic-btn" id="micBtn" title="Voice input">
                                <i class="fa-solid fa-microphone" id="micIcon"></i>
                                <span class="mic-ring"></span>
                            </button>
                            <!-- Send Button -->
                            <button id="sendBtn" class="send-btn" title="Send">
                                <i class="fa-solid fa-paper-plane" id="sendIcon"></i>
                            </button>
                        </div>
                    </div>
                    <p class="disclaimer">Shanu AI can make mistakes. Developed by Shiva Saini.</p>
                </div>
            </footer>

        </main>
    </div>

    <!-- ===== TOAST NOTIFICATION ===== -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toastMsg">Message here</span>
    </div>

    <!-- Scripts (module type for firebase/chat) -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="chat.js"></script>
</body>
</html>
