<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanu AI | Next-Gen Conversational AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-box">S</div>
                <div class="brand-info">
                    <h2>Shanu AI</h2>
                    <p>By Shiva Saini</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" id="newChatBtn">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
                <div class="history-label">Recent Moods</div>
                <div id="recentMoods" class="mood-history">
                    </div>
            </nav>

            <div class="sidebar-footer">
                <button class="icon-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
                <button class="icon-btn" id="clearBtn" title="Clear History"><i class="fa-solid fa-trash-can"></i></button>
            </div>
        </aside>

        <main class="chat-wrapper">
            <header class="chat-header">
                <div class="mood-selector-wrapper">
                    <button id="moodBtn" class="glass-btn">
                        <span id="currentMoodLabel">😌 Normal</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div id="moodList" class="mood-dropdown glass-card">
                        </div>
                </div>
                <div class="status-indicator">
                    <span class="dot"></span> Online
                </div>
            </header>

            <section id="chat" class="chat-display">
                <div class="welcome-screen" id="emptyPlaceholder">
                    <div class="welcome-icon">👋</div>
                    <h1>Shanu AI se baatein karein</h1>
                    <p>Experience the next level of Hinglish AI interaction. Messages are securely saved to your session.</p>
                </div>
            </section>

            <footer class="input-container">
                <div class="input-bar glass-card">
                    <textarea id="inputBox" placeholder="Message Shanu AI..." rows="1"></textarea>
                    <div class="action-buttons">
                        <button id="sendBtn" class="send-btn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                <p class="disclaimer">Shanu AI can make mistakes. Developed by Shiva Saini.</p>
            </footer>
        </main>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="chat.js"></script>
</body>
  </html>
