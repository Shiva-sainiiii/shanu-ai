<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shanu AI — Mood Chat</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Nunito", sans-serif !important;
    }
    :root {
      --bg: #0A0F19;
      --panel: #12151c;
      --muted: #98a1a8;
      --cyan: #00eaff;
      --card: #141A1E;
      --user-text: #022;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: #e9e9e9;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 640px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.03);
      display: flex;
      flex-direction: column;
      margin-top: 20px;
    }

    header {  
      display: flex;  
      gap: 12px;  
      align-items: center;  
      margin-bottom: 10px;  
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--cyan), #00b3ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #022;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 6px 18px rgba(0,180,255,0.06);
    }

    h1 {
      margin-left: 5px;
      font-size: 18px;
      color: var(--cyan);
      letter-spacing: 0.6px;
    }

    .small {
      margin-left: 5px;
      font-size: 10px;
      color: var(--muted);
    }

    #chat {
      margin-top: 12px;
      height: 60vh;
      overflow-y: auto;
      padding: 16px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.01);
    }

    .placeholder {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 40%;
    }

    .msg {
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      max-width: 85%;
      width: fit-content;
      line-height: 1.45;
      word-break: break-word;
      font-size: 15px;
      animation: pop .16s ease-out;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    @keyframes pop {
      from { transform: translateY(6px) scale(0.99); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .user {
      margin-left: auto;
      background: linear-gradient(135deg, var(--cyan), #00b3ff);
      color: var(--user-text);
    }

    .bot {
      background: #0f1418;
      border: 1px solid rgba(255,255,255,0.03);
      color: #e6eef6;
    }

    .inputArea {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      align-items: flex-end;
    }

    #inputBox {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      background: var(--card);
      color: #e9e9e9;
      outline: none;
      font-size: 15px;
      resize: none;
    }

    #sendBtn {
      width: 96px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--cyan);
      color: var(--user-text);
      font-weight: 700;
      cursor: pointer;
    }

    .mood-wrap { position: relative; }
    #moodBtn {
      background: #0f1418;
      border: 1px solid rgba(0, 234, 255, 0.3);
      color: #e9e9e9;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      min-width: 150px;
      text-align: left;
    }

    .mood-list {
      position: absolute;
      top: 110%;
      left: 0;
      width: 100%;
      background: #0f1418;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      display: none;
      z-index: 10;
    }

    .mood-item { padding: 12px 14px; cursor: pointer; }
    .mood-item:hover { background: rgba(0, 234, 255, 0.15); }
    
    .smallBtn {
      padding: 10px;
      border-radius: 10px;
      background: var(--card);
      color: #e9e9e9;
      border: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
    }

    @media (max-width: 540px) {
      .container { padding: 12px; height: 100vh; border-radius: 0; margin-top: 0; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">S</div>
      <div>
        <h1>Shanu AI</h1>
        <div class="small">By Shiva Saini</div> </div>

      <div style="margin-left: auto; display: flex; gap: 8px;">
        <div class="mood-wrap">
          <button id="moodBtn">😌 Normal</button>
          <div class="mood-list" id="moodList"></div>
        </div>
        <button class="smallBtn" id="clearBtn">Clear</button>
      </div>
    </header>

    <div id="chat">
      <div class="placeholder" id="emptyPlaceholder">
        Say hi to Shanu 👋 — messages will be saved to your session.
      </div>
    </div>

    <div class="inputArea">
      <textarea id="inputBox" placeholder="Type your message..." rows="1"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCBAQgLhVaNcH1YS_qldqKTJ9Kg-JO9A74",
      authDomain: "shanu-ai.firebaseapp.com",
      projectId: "shanu-ai",
      storageBucket: "shanu-ai.firebasestorage.app",
      messagingSenderId: "225114447873",
      appId: "1:225114447873:web:408763c5b259506506a000",
      measurementId: "G-YLWQX2C85W"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Export variables to window for chat.js
    window.db = db;
    window.fsHelpers = { collection, addDoc, query, where, orderBy, limit, getDocs };
  </script>

  <script src="chat.js"></script>
</body>
                      </html>
